<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Global Atlas</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505; /* Deep dark background */
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #fff;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Glassmorphic UI Panel */
        #ui-panel {
            position: absolute;
            top: 50%;
            left: 5%;
            transform: translateY(-50%);
            width: 320px;
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 30px;
            z-index: 10;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #ui-panel h2 {
            margin-top: 0;
            font-size: 1.5rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 15px;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .model-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .model-item {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .model-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateX(10px);
        }

        .model-item h3 {
            margin: 0 0 5px 0;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .model-item p {
            margin: 0;
            font-size: 0.8rem;
            color: #aaa;
            letter-spacing: 1px;
        }
        
        /* Subtle glowing dot next to text */
        .model-item::before {
            content: '';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background-color: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .model-item:hover::before {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>Locations</h2>
        <ul class="model-list">
            <li class="model-item" data-lat="40.7128" data-lon="-74.0060" data-url="viewer.html?model=gannett">
                <h3>Gannett Building</h3>
                <p>New York, NY</p>
            </li>
            <li class="model-item" data-lat="51.5074" data-lon="-0.1278" data-url="viewer.html?model=alpha">
                <h3>Project Alpha</h3>
                <p>London, UK</p>
            </li>
            <li class="model-item" data-lat="35.6895" data-lon="139.6917" data-url="viewer.html?model=beta">
                <h3>Project Beta</h3>
                <p>Tokyo, JP</p>
            </li>
        </ul>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Push the camera out to view the whole globe
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 40); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Group to hold globe and POIs so they rotate together
        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // 2. Create the Wireframe Globe
        const radius = 15;
        const segments = 32;
        const geometry = new THREE.SphereGeometry(radius, segments, segments);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0x444444, 
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const globe = new THREE.Mesh(geometry, material);
        earthGroup.add(globe);

        // Add a subtle inner glow sphere to make the wireframe pop
        const innerGeom = new THREE.SphereGeometry(radius - 0.2, 32, 32);
        const innerMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
        const innerGlobe = new THREE.Mesh(innerGeom, innerMat);
        earthGroup.add(innerGlobe);

        // 3. Math Helper: Convert Lat/Lon to 3D Space (Vector3)
        function getCoordinates(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            
            return new THREE.Vector3(x, y, z);
        }

        // 4. Create POI Markers
        const poiGeometry = new THREE.SphereGeometry(0.3, 16, 16);
        const poiMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff }); // Cyan

        const items = document.querySelectorAll('.model-item');
        const markers = [];

        items.forEach(item => {
            const lat = parseFloat(item.getAttribute('data-lat'));
            const lon = parseFloat(item.getAttribute('data-lon'));
            
            // Generate Marker
            const marker = new THREE.Mesh(poiGeometry, poiMaterial);
            const pos = getCoordinates(lat, lon, radius);
            marker.position.copy(pos);
            earthGroup.add(marker);
            markers.push(marker);

            // 5. Interaction Logic
            
            // HOVER: Rotate the globe so the POI faces the camera, and zoom in
            item.addEventListener('mouseenter', () => {
                // Stop idle rotation
                autoRotate = false;

                // Calculate the rotation needed to bring this lat/lon to the front
                const targetRotationY = -((lon - 90) * (Math.PI / 180));
                const targetRotationX = lat * (Math.PI / 180);

                // Smoothly animate the Earth's rotation to face the marker
                gsap.to(earthGroup.rotation, {
                    x: targetRotationX,
                    y: targetRotationY,
                    duration: 1.5,
                    ease: "power2.inOut"
                });

                // Smoothly animate the camera closer
                gsap.to(camera.position, {
                    z: 22, // Move closer
                    duration: 1.5,
                    ease: "power2.inOut"
                });
            });

            // MOUSE LEAVE: Restore default view and idle spin
            item.addEventListener('mouseleave', () => {
                autoRotate = true;
                
                // Animate camera back out
                gsap.to(camera.position, {
                    z: 40,
                    duration: 1.5,
                    ease: "power2.inOut"
                });
                
                // Return Earth rotation X to 0 (equator level)
                gsap.to(earthGroup.rotation, {
                    x: 0,
                    duration: 1.5,
                    ease: "power2.inOut"
                });
            });

            // CLICK: Transition to the viewer page
            item.addEventListener('click', () => {
                const url = item.getAttribute('data-url');
                
                // Fade out the UI panel
                document.getElementById('ui-panel').style.opacity = '0';
                document.getElementById('ui-panel').style.transition = 'opacity 0.5s ease';

                // Zoom camera way into the point
                gsap.to(camera.position, {
                    z: radius + 0.5,
                    duration: 1,
                    ease: "power3.in",
                    onComplete: () => {
                        window.location.href = url; // Redirect
                    }
                });
            });
        });

        // 6. Animation Loop
        let autoRotate = true;
        
        function animate() {
            requestAnimationFrame(animate);
            
            // Slow idle spin when not hovering
            if (autoRotate) {
                earthGroup.rotation.y += 0.002;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        // 7. Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
