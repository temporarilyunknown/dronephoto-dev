<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binghamton Development Atlas</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #030303;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #fff;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* Glassmorphic UI Elements */
        .glass-panel {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            z-index: 10;
        }

        #ui-panel {
            position: absolute;
            bottom: 5%; left: 3%;
            width: 340px; padding: 25px;
            opacity: 0; /* Hidden for start animation */
        }

        #ui-panel h2 {
            margin: 0 0 15px 0;
            font-size: 1.3rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            font-weight: 300;
        }

        .model-list {
            list-style: none;
            padding: 0; margin: 0;
            display: flex; flex-direction: column; gap: 10px;
        }

        .model-item {
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .model-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .model-item h3 {
            margin: 0 0 3px 0;
            font-size: 1rem; font-weight: 400;
        }

        .model-item .coord-display {
            margin: 0;
            font-size: 0.7rem;
            color: #00ffff;
            letter-spacing: 1px;
            font-family: monospace;
            opacity: 0.8;
        }

        .model-item::before {
            content: '';
            position: absolute;
            right: 15px; top: 50%;
            transform: translateY(-50%);
            width: 6px; height: 6px;
            background-color: #00ffff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffff;
            opacity: 0.2;
            transition: opacity 0.3s ease;
        }

        .model-item:hover::before { opacity: 1; }

        /* Project Titles & Coordinates in 3D Space */
        .poi-label {
            color: #fff;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(5px);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            white-space: nowrap;
            pointer-events: none;
            opacity: 0; /* Hidden for start animation */
            margin-top: 30px;
            transition: opacity 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .poi-label .title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .poi-label .coords {
            font-size: 0.65rem;
            color: #00ffff;
            font-family: monospace;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui-panel" class="glass-panel">
        <h2>Binghamton Sites</h2>
        <ul class="model-list">
            <li class="model-item" 
                data-id="gannett" 
                data-lat="42.0987" data-lon="-75.9125" 
                data-map="map-gannett.png" 
                data-url="viewer.html?model=gannett">
                <h3>Gannett Building</h3>
                <p class="coord-display">42.0987° N, -75.9125° W</p>
            </li>
            <li class="model-item" 
                data-id="alpha" 
                data-lat="42.1030" data-lon="-75.9180" 
                data-map="map-alpha.png" 
                data-url="viewer.html?model=alpha">
                <h3>Innovation Center</h3>
                <p class="coord-display">42.1030° N, -75.9180° W</p>
            </li>
            <li class="model-item" 
                data-id="beta" 
                data-lat="42.0950" data-lon="-75.9050" 
                data-map="map-beta.png" 
                data-url="viewer.html?model=beta">
                <h3>Riverside Complex</h3>
                <p class="coord-display">42.0950° N, -75.9050° W</p>
            </li>
        </ul>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 150); // Start far away

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        // --- 2. Math Helper (Lat/Lon to 3D Vector) ---
        // We define this BEFORE the globe so the GeoJSON parser can use it
        function getCoordinates(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        const earthRadius = 20;

        // --- 3. Create Core Sphere & Vector Continents (NO IMAGES) ---
        // Dark inner core
        const innerGeom = new THREE.SphereGeometry(earthRadius, 64, 64);
        const innerMat = new THREE.MeshBasicMaterial({ 
            color: 0x111111, // Dark base
            transparent: true,
            opacity: 0.95
        });
        const innerEarth = new THREE.Mesh(innerGeom, innerMat);
        earthGroup.add(innerEarth);

        // Fetch and draw accurate GeoJSON world map lines
        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
            .then(response => response.json())
            .then(data => {
                // Vector line material (Glowing blue/grey)
                const lineMaterial = new THREE.LineBasicMaterial({ 
                    color: 0x336688, 
                    transparent: true, 
                    opacity: 0.6 
                });

                data.features.forEach(feature => {
                    const geometry = feature.geometry;
                    if (geometry.type === 'Polygon') {
                        drawPolygon(geometry.coordinates, lineMaterial);
                    } else if (geometry.type === 'MultiPolygon') {
                        geometry.coordinates.forEach(polygon => drawPolygon(polygon, lineMaterial));
                    }
                });
            });

        function drawPolygon(coordinates, material) {
            coordinates.forEach(ring => {
                const points = [];
                ring.forEach(coord => {
                    // GeoJSON coordinates are formatted as [longitude, latitude]
                    const lon = coord[0];
                    const lat = coord[1];
                    // Plot lines slightly above the core sphere (Radius + 0.05) to prevent clipping
                    points.push(getCoordinates(lat, lon, earthRadius + 0.05)); 
                });
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, material);
                earthGroup.add(line);
            });
        }

        // Geometric outer wireframe shell
        const wireGeom = new THREE.IcosahedronGeometry(earthRadius + 0.2, 4);
        const wireMat = new THREE.MeshBasicMaterial({ 
            color: 0x444444, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.1 
        });
        const wireframeCube = new THREE.Mesh(wireGeom, wireMat);
        earthGroup.add(wireframeCube);

        // --- 4. Setup Markers & Labels ---
        const binghamtonCoords = { lat: 42.0987, lon: -75.9125 };
        const poiGeometry = new THREE.SphereGeometry(0.15, 16, 16);
        const poiMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const textureLoader = new THREE.TextureLoader();

        const items = document.querySelectorAll('.model-item');
        let activePatch = null; 
        const labels = [];

        items.forEach(item => {
            const lat = parseFloat(item.getAttribute('data-lat'));
            const lon = parseFloat(item.getAttribute('data-lon'));
            const name = item.querySelector('h3').textContent;
            const coordText = item.querySelector('.coord-display').textContent;
            const mapSrc = item.getAttribute('data-map');
            
            // A. Create Cyan Marker
            const marker = new THREE.Mesh(poiGeometry, poiMaterial);
            const pos = getCoordinates(lat, lon, earthRadius + 0.3);
            marker.position.copy(pos);
            earthGroup.add(marker);

            // B. Create HTML Label with Title and Coordinates
            const labelDiv = document.createElement('div');
            labelDiv.className = 'poi-label';
            labelDiv.innerHTML = `
                <span class="title">${name}</span>
                <span class="coords">${coordText}</span>
            `;
            const label = new THREE.CSS2DObject(labelDiv);
            label.position.set(0, 0, 0);
            marker.add(label);
            labels.push(labelDiv);

            // C. Create the CURVED Terrain Overlay Patch
            const patchRadius = 3; 
            const patchGeom = new THREE.CircleGeometry(patchRadius, 64);
            const posAttribute = patchGeom.attributes.position;
            const v = new THREE.Vector3();
            const curveRadius = earthRadius + 0.4; // Sits above vectors
            
            for (let i = 0; i < posAttribute.count; i++) {
                v.fromBufferAttribute(posAttribute, i);
                const dist = Math.sqrt(v.x * v.x + v.y * v.y);
                const zOffset = Math.sqrt(Math.pow(curveRadius, 2) - dist * dist) - curveRadius;
                posAttribute.setZ(i, zOffset);
            }
            patchGeom.computeVertexNormals(); 

            const patchTexture = textureLoader.load(mapSrc);
            const patchMat = new THREE.MeshBasicMaterial({
                map: patchTexture,
                transparent: true,
                opacity: 0, 
                depthWrite: false, 
                side: THREE.DoubleSide
            });
            const terrainPatch = new THREE.Mesh(patchGeom, patchMat);
            
            const patchPos = getCoordinates(lat, lon, curveRadius);
            terrainPatch.position.copy(patchPos);
            terrainPatch.lookAt(patchPos.clone().multiplyScalar(2));
            earthGroup.add(terrainPatch);

            // --- 5. Hover Interactions (Drone Angle) ---
            item.addEventListener('mouseenter', () => {
                autoRotate = false;
                activePatch = terrainPatch;

                const targetRotationY = -((lon - 90) * (Math.PI / 180));
                const targetRotationX = (lat + 12) * (Math.PI / 180);

                gsap.to(earthGroup.rotation, {
                    x: targetRotationX,
                    y: targetRotationY,
                    duration: 1.2,
                    ease: "power2.out"
                });

                gsap.to(camera.position, {
                    z: 32, 
                    duration: 1.2,
                    ease: "power2.out"
                });

                gsap.to(terrainPatch.material, {
                    opacity: 0.95,
                    duration: 0.8,
                    delay: 0.3 
                });
            });

            item.addEventListener('mouseleave', () => {
                if (activePatch) {
                    gsap.to(activePatch.material, { opacity: 0, duration: 0.5 });
                    activePatch = null;
                }

                gsap.to(earthGroup.rotation, {
                    x: binghamtonCoords.lat * (Math.PI / 180),
                    y: -((binghamtonCoords.lon - 90) * (Math.PI / 180)),
                    duration: 1.5,
                    ease: "power2.inOut",
                    onComplete: () => { autoRotate = true; }
                });

                gsap.to(camera.position, {
                    z: 45,
                    duration: 1.5,
                    ease: "power2.inOut"
                });
            });

            item.addEventListener('click', () => {
                const url = item.getAttribute('data-url');
                document.getElementById('ui-panel').style.opacity = '0';
                labels.forEach(l => l.style.opacity = '0');
                
                gsap.to(camera.position, {
                    z: earthRadius + 1.5,
                    duration: 0.8,
                    ease: "power3.in",
                    onComplete: () => { window.location.href = url; }
                });
            });
        });

        // --- 6. Start Animation Sequence ---
        let autoRotate = false;

        earthGroup.rotation.y = Math.PI; 
        earthGroup.rotation.x = 0;

        const tl = gsap.timeline({
            onComplete: () => { 
                autoRotate = true; 
                gsap.to(document.getElementById('ui-panel'), { opacity: 1, duration: 1 });
                labels.forEach(l => l.style.opacity = 1);
            }
        });

        tl.to(camera.position, {
            z: 45,
            duration: 3,
            ease: "power3.inOut"
        }, "+=0.5");

        tl.to(earthGroup.rotation, {
            x: binghamtonCoords.lat * (Math.PI / 180),
            y: -((binghamtonCoords.lon - 90) * (Math.PI / 180)),
            duration: 3,
            ease: "power3.inOut"
        }, "<");


        // --- 7. Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if (autoRotate) {
                earthGroup.rotation.y += 0.0005; 
            }
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
