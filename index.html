<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binghamton Development Atlas</title>
    
    <style>
        body { 
            margin: 0; padding: 0; 
            background-color: #030303; 
            overflow: hidden; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1;
        }

        /* --- Loading Screen Elements --- */
        #loading-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #111;
            z-index: 50;
            transition: opacity 1.5s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-logo {
            position: absolute;
            top: 44%; left: 50%;
            transform: translate(-50%, -50%);
            height: clamp(80px, 15vw, 150px);
            width: auto;
            mix-blend-mode: screen;
            z-index: 55;
            transition: opacity 0.5s ease;
        }

        #loading-logo.hidden { opacity: 0; }

        #spinner {
            position: absolute;
            top: calc(44% + 140px); left: 50%;
            transform: translate(-50%, -50%);
            width: 40px; height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 55;
            transition: opacity 0.5s ease;
        }

        #spinner.hidden { opacity: 0; }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        #loading-text {
            position: absolute;
            top: calc(44% + 210px); left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 55;
            opacity: 0.7; 
            transition: opacity 0.5s ease; 
            white-space: nowrap;
        }

        #loading-text.hidden { opacity: 0 !important; }

        /* --- Dark Header UI --- */
        #title-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: row; 
            justify-content: space-between;
            align-items: center; 
            padding: 15px 5%;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 1.5s ease-out; 
            gap: 15px; /* Prevent overlapping on smaller screens */
        }

        #title-container.visible { opacity: 1; }

        #building-logo {
            height: clamp(25px, 5vw, 40px);
            width: auto;
            max-width: 25vw; /* Prevents clipping off the right edge */
            object-fit: contain;
            mix-blend-mode: screen; 
            flex-shrink: 0;
        }

        #building-title {
            margin: 0;
            color: #ffffff;
            font-size: clamp(1rem, 3.5vw, 1.8rem); /* Slightly smaller base for mobile */
            letter-spacing: 2px;
            opacity: 0.9;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
            white-space: nowrap; 
            text-transform: uppercase;
            font-weight: 300;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* --- Globe UI Panel --- */
        .glass-panel {
            background: rgba(20, 20, 20, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            z-index: 10;
            color: #fff;
        }

        #ui-panel {
            position: absolute;
            bottom: 3%; left: 3%;
            width: clamp(260px, 90vw, 360px); /* Responsive width */
            padding: 20px;
            box-sizing: border-box;
            opacity: 0; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #ui-panel h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
            font-weight: 300;
        }

        .model-list {
            list-style: none;
            padding: 0; margin: 0;
            display: flex; flex-direction: column; gap: 8px;
            /* Mobile fixes: Scrollable list */
            max-height: 25vh; /* Prevents taking up half the screen */
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 5px; /* Room for scrollbar */
        }

        /* Custom scrollbar for the menu */
        .model-list::-webkit-scrollbar { width: 4px; }
        .model-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        .model-list::-webkit-scrollbar-thumb { background: rgba(0, 255, 255, 0.4); border-radius: 4px; }

        .model-item {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            position: relative;
        }

        .model-item.active, .model-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(0, 255, 255, 0.4);
            transform: translateX(5px);
        }

        .model-item h3 { margin: 0 0 3px 0; font-size: 0.95rem; font-weight: 400; }
        .model-item .coord-display {
            margin: 0; font-size: 0.65rem; color: #00ffff;
            letter-spacing: 1px; font-family: monospace; opacity: 0.8;
        }

        .model-item::before {
            content: ''; position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%); width: 6px; height: 6px;
            background-color: #00ffff; border-radius: 50%; opacity: 0.2;
            transition: all 0.4s ease;
        }

        .model-item.active::before, .model-item:hover::before { 
            opacity: 1; box-shadow: 0 0 12px #00ffff; background-color: #fff;
        }

        /* --- 3D Labels --- */
        .poi-label {
            color: #fff;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(5px);
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            white-space: nowrap; pointer-events: none;
            opacity: 0; margin-top: 30px;
            transition: opacity 0.5s ease;
            display: flex; flex-direction: column; align-items: center;
        }

        .poi-label .title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: bold; margin-bottom: 4px; }
        .poi-label .coords { font-size: 0.65rem; color: #00ffff; font-family: monospace; letter-spacing: 1px; }

        /* Media query for tighter mobile fitting */
        @media (max-width: 600px) {
            #title-container { padding: 12px 15px; }
            #ui-panel {
                bottom: 15px; left: 50%;
                transform: translateX(-50%);
                width: 92%; padding: 15px;
            }
        }
        @media (min-height: 800px) {
            .model-list { max-height: 40vh; }
        }
    </style>
</head>
<body>

    <div id="loading-overlay"></div>
    <img id="loading-logo" src="LogoF.png" alt="Loading Logo">
    <div id="spinner"></div>
    <div id="loading-text">Loading Atlas</div>

    <div id="title-container">
        <h1 id="building-title">Binghamton Drone Atlas</h1>
        <img id="building-logo" src="LogoF.png" alt="University Logo">
    </div>

    <div id="ui-panel" class="glass-panel">
        <h2>University Sites</h2>
        <ul class="model-list">
            <li class="model-item" data-id="gannett" data-lat="42.0987" data-lon="-75.9125" data-map="map-gannett.png" data-url="viewer.html?model=gannett">
                <h3>Gannett Building</h3><p class="coord-display">42.0987° N, -75.9125° W</p>
            </li>
            <li class="model-item" data-id="main" data-lat="42.0885" data-lon="-75.9680" data-map="map-main.png" data-url="viewer.html?model=main">
                <h3>BU Main Campus</h3><p class="coord-display">42.0885° N, -75.9680° W</p>
            </li>
            <li class="model-item" data-id="udc" data-lat="42.0974" data-lon="-75.9126" data-map="map-udc.png" data-url="viewer.html?model=udc">
                <h3>Downtown Center</h3><p class="coord-display">42.0974° N, -75.9126° W</p>
            </li>
            <li class="model-item" data-id="hsc" data-lat="42.1121" data-lon="-75.9587" data-map="map-hsc.png" data-url="viewer.html?model=hsc">
                <h3>Health Sciences Campus</h3><p class="coord-display">42.1121° N, -75.9587° W</p>
            </li>
        </ul>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. Loading Screen Logic ---
        const overlay = document.getElementById('loading-overlay');
        const loadingLogo = document.getElementById('loading-logo');
        const spinner = document.getElementById('spinner');
        const loadingText = document.getElementById('loading-text');
        const titleContainer = document.getElementById('title-container');

        const phrases = ["Loading Atlas", "Fetching GeoJSON", "Building 3D Globe", "Optimizing Terrain", "Almost Ready"];
        let phraseIndex = 0;

        const loadingInterval = setInterval(() => {
            loadingText.style.opacity = '0'; 
            setTimeout(() => {
                phraseIndex = (phraseIndex + 1) % phrases.length;
                loadingText.textContent = phrases[phraseIndex];
                loadingText.style.opacity = '0.7'; 
            }, 500); 
        }, 2500);


        // --- 2. 3D Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 0, 150); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const labelRenderer = new THREE.CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        const earthGroup = new THREE.Group();
        scene.add(earthGroup);

        const earthRadius = 20;
        const layerWorld = earthRadius + 0.01;
        const layerStates = earthRadius + 0.02;
        const layerCounties = earthRadius + 0.03;
        const layerPatches = earthRadius + 0.04;

        function getCoordinates(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        function getShortestRotationY(currentY, targetLon) {
            const targetYBase = -(targetLon + 90) * (Math.PI / 180); 
            let diff = targetYBase - (currentY % (Math.PI * 2));
            if (diff > Math.PI) diff -= Math.PI * 2;
            if (diff < -Math.PI) diff += Math.PI * 2;
            return currentY + diff;
        }

        const innerGeom = new THREE.SphereGeometry(earthRadius, 64, 64);
        const innerMat = new THREE.MeshBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.95 });
        const innerEarth = new THREE.Mesh(innerGeom, innerMat);
        earthGroup.add(innerEarth);

        function drawPolygon(coordinates, material, radius) {
            coordinates.forEach(ring => {
                const points = [];
                ring.forEach(coord => { points.push(getCoordinates(coord[1], coord[0], radius)); });
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geometry, material);
                earthGroup.add(line);
            });
        }

        fetch('https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json')
            .then(r => r.json()).then(data => {
                const countryMat = new THREE.LineBasicMaterial({ color: 0x336688, transparent: true, opacity: 0.4 });
                data.features.forEach(f => {
                    if (f.geometry.type === 'Polygon') drawPolygon(f.geometry.coordinates, countryMat, layerWorld);
                    else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(p => drawPolygon(p, countryMat, layerWorld));
                });
            });

        fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
            .then(r => r.json()).then(data => {
                const stateMat = new THREE.LineBasicMaterial({ color: 0x44aaaa, transparent: true, opacity: 0.6 });
                data.features.forEach(f => {
                    if (f.geometry.type === 'Polygon') drawPolygon(f.geometry.coordinates, stateMat, layerStates);
                    else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(p => drawPolygon(p, stateMat, layerStates));
                });
            });

        fetch('https://raw.githubusercontent.com/codeforamerica/click_that_hood/master/public/data/new-york-counties.geojson')
            .then(r => r.json()).then(data => {
                const nyMat = new THREE.LineBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.5 });
                const broomeMat = new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 1.0 }); 
                data.features.forEach(f => {
                    const matToUse = (f.properties.name === "Broome") ? broomeMat : nyMat;
                    if (f.geometry.type === 'Polygon') drawPolygon(f.geometry.coordinates, matToUse, layerCounties);
                    else if (f.geometry.type === 'MultiPolygon') f.geometry.coordinates.forEach(p => drawPolygon(p, matToUse, layerCounties));
                });
            });

        const wireGeom = new THREE.IcosahedronGeometry(earthRadius + 0.2, 4);
        const wireMat = new THREE.MeshBasicMaterial({ color: 0x444444, wireframe: true, transparent: true, opacity: 0.1 });
        const wireframeCube = new THREE.Mesh(wireGeom, wireMat);
        earthGroup.add(wireframeCube);

        // Setup Markers & Patches
        const markers = []; 
        const binghamtonCoords = { lat: 42.0987, lon: -75.9125 };
        const poiGeometry = new THREE.SphereGeometry(0.003, 16, 16); 
        const textureLoader = new THREE.TextureLoader();
        
        const items = document.querySelectorAll('.model-item');
        const labels = [];
        let tourTimer = null;
        let tourIndex = 0;

        items.forEach((item, index) => {
            const lat = parseFloat(item.getAttribute('data-lat'));
            const lon = parseFloat(item.getAttribute('data-lon'));
            const name = item.querySelector('h3').textContent;
            const coordText = item.querySelector('.coord-display').textContent;
            
            // Unique material for isolated hovering
            const markerMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0 });
            const marker = new THREE.Mesh(poiGeometry, markerMat);
            const pos = getCoordinates(lat, lon, layerPatches + 0.01);
            marker.position.copy(pos);
            earthGroup.add(marker);
            markers.push(marker);

            const labelDiv = document.createElement('div');
            labelDiv.className = 'poi-label';
            labelDiv.innerHTML = `<span class="title">${name}</span><span class="coords">${coordText}</span>`;
            const label = new THREE.CSS2DObject(labelDiv);
            label.position.set(0, 0, 0);
            marker.add(label);
            labels.push(labelDiv);

            const patchRadius = 0.08; 
            const patchGeom = new THREE.CircleGeometry(patchRadius, 64);
            const posAttribute = patchGeom.attributes.position;
            const v = new THREE.Vector3();
            for (let i = 0; i < posAttribute.count; i++) {
                v.fromBufferAttribute(posAttribute, i);
                const dist = Math.sqrt(v.x * v.x + v.y * v.y);
                const zOffset = Math.sqrt(Math.pow(layerPatches, 2) - dist * dist) - layerPatches;
                posAttribute.setZ(i, zOffset);
            }
            patchGeom.computeVertexNormals(); 

            const patchTexture = textureLoader.load(item.getAttribute('data-map'));
            const patchMat = new THREE.MeshBasicMaterial({ map: patchTexture, transparent: true, opacity: 0, depthWrite: false, side: THREE.DoubleSide });
            const terrainPatch = new THREE.Mesh(patchGeom, patchMat);
            
            const patchPos = getCoordinates(lat, lon, layerPatches);
            terrainPatch.position.copy(patchPos);
            terrainPatch.lookAt(patchPos.clone().multiplyScalar(2));
            earthGroup.add(terrainPatch);

            item._lat = lat; item._lon = lon; item._terrainPatch = terrainPatch;

            item.addEventListener('mouseenter', () => {
                clearTimeout(tourTimer); 
                focusItem(index, false);
            });

            item.addEventListener('click', () => {
                const url = item.getAttribute('data-url');
                document.getElementById('ui-panel').style.opacity = '0';
                titleContainer.style.opacity = '0';
                labels.forEach(l => l.style.opacity = '0');
                markers.forEach(m => gsap.to(m.material, { opacity: 0, duration: 0.5 }));
                
                gsap.to(camera.position, {
                    z: earthRadius + 0.05, 
                    duration: 1.0, ease: "power3.in",
                    onComplete: () => { window.location.href = url; }
                });
            });
        });

        const uiPanel = document.getElementById('ui-panel');
        uiPanel.addEventListener('mouseenter', () => { clearTimeout(tourTimer); });
        uiPanel.addEventListener('mouseleave', () => {
            resetToOverview();
            clearTimeout(tourTimer);
            tourTimer = setTimeout(() => { tourIndex = 0; focusItem(tourIndex, true); }, 4000); 
        });

        // --- 3. Camera Interaction Functions ---
        
        function focusItem(index, isAutoTour = false) {
            gsap.killTweensOf(earthGroup.rotation);
            gsap.killTweensOf(camera.position);

            markers.forEach((m, i) => {
                gsap.killTweensOf(m.material);
                gsap.to(m.material, { opacity: i === index ? 1 : 0, duration: 0.5 });
            });
            labels.forEach((l, i) => {
                l.style.opacity = i === index ? '1' : '0';
            });

            items.forEach((i, idx) => {
                i.classList.remove('active');
                if(i._terrainPatch) { 
                    gsap.killTweensOf(i._terrainPatch.material); 
                    gsap.to(i._terrainPatch.material, { opacity: 0, duration: 0.5 }); 
                }
            });

            const item = items[index];
            item.classList.add('active'); 
            
            // For smoother rotation when navigating around the same general area
            const targetRotationY = getShortestRotationY(earthGroup.rotation.y, item._lon);
            const targetRotationX = item._lat * (Math.PI / 180);

            gsap.to(earthGroup.rotation, { x: targetRotationX, y: targetRotationY, duration: 2.8, ease: "power2.inOut" });
            gsap.to(camera.position, { z: 20.15, duration: 2.8, ease: "power2.inOut" });

            if (item._terrainPatch) {
                gsap.to(item._terrainPatch.material, { opacity: 1, duration: 1.0, delay: 1.0 });
            }

            if (isAutoTour) {
                // Ensure the menu scrolls automatically with the auto-tour
                const itemElement = items[index];
                const listContainer = document.querySelector('.model-list');
                listContainer.scrollTo({
                    top: itemElement.offsetTop - listContainer.offsetTop - 10,
                    behavior: 'smooth'
                });

                tourTimer = setTimeout(() => {
                    tourIndex = (tourIndex + 1) % items.length;
                    focusItem(tourIndex, true);
                }, 5500); 
            }
        }

        function resetToOverview() {
            gsap.killTweensOf(earthGroup.rotation);
            gsap.killTweensOf(camera.position);

            markers.forEach(m => {
                gsap.killTweensOf(m.material);
                gsap.to(m.material, { opacity: 0, duration: 0.5 });
            });
            labels.forEach(l => l.style.opacity = '0');

            items.forEach(i => {
                i.classList.remove('active');
                if(i._terrainPatch) { gsap.killTweensOf(i._terrainPatch.material); gsap.to(i._terrainPatch.material, { opacity: 0, duration: 0.5 }); }
            });

            const targetRotationY = getShortestRotationY(earthGroup.rotation.y, binghamtonCoords.lon);
            gsap.to(earthGroup.rotation, { x: binghamtonCoords.lat * (Math.PI / 180), y: targetRotationY, duration: 2.8, ease: "power2.inOut" });
            gsap.to(camera.position, { z: 20.4, duration: 2.8, ease: "power2.inOut" });
        }


        // --- 4. Boot Sequence & Forced Loading ---
        const startLon = 0; 
        earthGroup.rotation.x = 25 * (Math.PI / 180); 
        earthGroup.rotation.y = -(startLon + 90) * (Math.PI / 180); 

        setTimeout(() => {
            clearInterval(loadingInterval);
            loadingLogo.classList.add('hidden');
            spinner.classList.add('hidden');
            loadingText.classList.add('hidden');

            setTimeout(() => {
                overlay.classList.add('hidden');
                setTimeout(() => { titleContainer.classList.add('visible'); }, 500);

                const tl = gsap.timeline({
                    onComplete: () => { 
                        gsap.to(document.getElementById('ui-panel'), { opacity: 1, duration: 1 });
                        tourTimer = setTimeout(() => { focusItem(0, true); }, 2000);
                    }
                });

                tl.to({}, { duration: 1.0 });

                const usLon = -98; 
                const usRotY = -(usLon + 90) * (Math.PI / 180);
                
                tl.to(camera.position, { z: 40, duration: 2.5, ease: "power2.inOut" }, "+=0.2");
                tl.to(earthGroup.rotation, { 
                    x: 38 * (Math.PI / 180), 
                    y: usRotY, 
                    duration: 2.5, ease: "power2.inOut" 
                }, "<");

                tl.to({}, { duration: 1.0 });

                const bingRotY = -(binghamtonCoords.lon + 90) * (Math.PI / 180);

                tl.to(camera.position, { z: 20.4, duration: 3.5, ease: "power3.inOut" }, "+=0.2");
                tl.to(earthGroup.rotation, {
                    x: binghamtonCoords.lat * (Math.PI / 180),
                    y: bingRotY,
                    duration: 3.5, ease: "power3.inOut"
                }, "<");

            }, 800);
        }, 5000);


        // --- 5. Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const dist = camera.position.distanceTo(scene.position);
            const scaleFactor = Math.max(0.3, dist / 150); 
            
            markers.forEach(m => {
                m.scale.set(scaleFactor, scaleFactor, scaleFactor);
            });

            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
