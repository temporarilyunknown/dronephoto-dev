<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gannett Building</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; background-color: #222; overflow: hidden; }
        
        /* 3D Viewer Base */
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
        }

        /* Loading Screen Elements */
        #loading-overlay {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100vw; 
            height: 100vh;
            background-color: #222;
            z-index: 5;
            transition: opacity 1.5s ease-in-out;
        }

        #loading-overlay.hidden {
            opacity: 0;
            pointer-events: none; /* Clicks pass through AFTER it hides */
        }

        #loading-logo {
            position: absolute;
            top: 44%;
            left: 50%;
            transform: translate(-50%, -50%);
            height: clamp(80px, 15vw, 150px);
            width: auto;
            mix-blend-mode: screen;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #loading-logo.hidden {
            opacity: 0;
        }

        /* Restored Original Spinner */
        #spinner {
            position: absolute;
            top: calc(44% + 140px);
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 10;
            transition: opacity 0.5s ease;
        }

        #spinner.hidden {
            opacity: 0;
        }

        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* Loading Text with Fade */
        #loading-text {
            position: absolute;
            top: calc(44% + 210px);
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            z-index: 10;
            opacity: 0.7; /* Base opacity */
            transition: opacity 0.5s ease; /* Controls the fade speed */
            white-space: nowrap;
        }

        /* Used strictly for the complete hide on load */
        #loading-text.hidden {
            opacity: 0 !important;
        }

        /* --- Dark Header UI --- */
        #title-container {
            position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            background-color: rgba(20, 20, 20, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: row; 
            justify-content: space-between;
            align-items: center; 
            padding: 15px 5%;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 1.5s ease-out; 
        }

        #title-container.visible { opacity: 1; }

        #building-logo {
            height: clamp(35px, 5vw, 50px);
            width: auto;
            mix-blend-mode: screen; 
        }

        #building-title {
            margin: 0;
            color: #ffffff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            letter-spacing: 2px;
            opacity: 0.9;
            text-shadow: 0px 4px 15px rgba(0, 0, 0, 0.8);
            white-space: nowrap; 
        }

        /* Custom Interaction Prompt */
        #custom-prompt {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            text-align: center;
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(20, 20, 20, 0.4); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); 
            color: #ffffff;
            padding: 12px 32px; 
            border-radius: 50px; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: 0.9rem; 
            font-weight: 400;
            text-transform: uppercase; 
            letter-spacing: 2px; 
            pointer-events: none;
            z-index: 10;
            opacity: 0; 
            transition: opacity 0.8s ease;
            animation: pulse 2.5s infinite;
        }

        #custom-prompt.visible { opacity: 1; }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.02); } 
            100% { transform: translateX(-50%) scale(1); }
        }
    </style> 
</head>  

<body>

    <div id="loading-overlay"></div>
    
    <img id="loading-logo" src="LogoF.png" alt="Loading Logo">
    <div id="spinner"></div>
    <div id="loading-text">Loading Model</div>

    <div id="title-container">
        <h1 id="building-title">Gannett Building</h1>
        <img id="building-logo" src="LogoF.png" alt="Gannett Logo">
    </div>

    <div id="custom-prompt">Drag to interact</div>
    
    <model-viewer 
        id="gannett-viewer"
        src="Gannett-Drive-4-10-2026-textured_model.glb" 
        skybox-image="sky4.hdr"
        ar 
        ar-modes="webxr scene-viewer quick-look"  
        rotation-per-second="3.15deg"
        tone-mapping="neutral" 
        poster="poster.webp" 
        shadow-intensity="1" 
        camera-orbit="520.2deg 74.59deg 675m" 
        field-of-view="12deg" 
        orientation="0 -90deg 0" 
        max-camera-orbit="auto 90deg 700m" 
        min-camera-orbit="auto auto 100.4m" 
        min-field-of-view="4deg"
        interpolation-decay="575"
        interaction-prompt="none"> 
    </model-viewer>

    <script>
        const viewer = document.getElementById('gannett-viewer');
        const titleContainer = document.getElementById('title-container');
        const overlay = document.getElementById('loading-overlay');
        const loadingLogo = document.getElementById('loading-logo');
        const spinner = document.getElementById('spinner');
        const loadingText = document.getElementById('loading-text');
        const customPrompt = document.getElementById('custom-prompt');

        // --- Fading Text Logic ---
        const phrases = [
            "Loading Model", 
            "Preparing 3D Environment", 
            "Optimizing Textures", 
            "Almost Ready"
        ];
        let phraseIndex = 0;

        // Cycles text every 2.5 seconds
        const loadingInterval = setInterval(() => {
            loadingText.style.opacity = '0'; // Fade out
            
            setTimeout(() => {
                phraseIndex = (phraseIndex + 1) % phrases.length;
                loadingText.textContent = phrases[phraseIndex];
                loadingText.style.opacity = '0.7'; // Fade back in
            }, 500); // Wait 500ms for the CSS fade-out to complete before changing text
        }, 2500);

        // --- Animation sequence on load ---
        viewer.addEventListener('load', () => {
            
            // 1. Stop the text from cycling
            clearInterval(loadingInterval);

            // 2. Hide logo, spinner, and loading text immediately
            loadingLogo.classList.add('hidden');
            spinner.classList.add('hidden');
            loadingText.classList.add('hidden');

            // 3. Wait 800ms, then trigger black overlay fade
            setTimeout(() => {
                overlay.classList.add('hidden'); 

                // Delay the UI fade-in just a fraction of a second
                setTimeout(() => {
                    titleContainer.classList.add('visible'); 
                }, 300);

                // Delay the camera zoom slightly
                setTimeout(() => {
                    viewer.setAttribute('camera-orbit', '582.2deg 74.59deg 255m'); 
                }, 400);

                // 4. Wait for the camera to mostly settle
                setTimeout(() => {
                    customPrompt.classList.add('visible');
                    
                    // Turn on auto-rotation
                    viewer.autoRotate = true; 
                    
                    // Give user control now that animations are done
                    viewer.setAttribute('camera-controls', '');
                    
                }, 3200); 

            }, 800);
        });

        // Hide custom prompt the moment the user interacts
        viewer.addEventListener('camera-change', (event) => {
            if (event.detail.source === 'user-interaction') {
                customPrompt.classList.remove('visible');
                viewer.setAttribute('interpolation-decay', '100');
            }
        });
    </script>

</body>
</html>
